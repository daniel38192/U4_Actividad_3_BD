<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="appLayout(pageTitle, activePage, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <title th:text="${pageTitle}">Aplicación</title>
    <style>
        :root {
            --bg: #f3f7f4;
            --surface: rgba(255, 255, 255, 0.86);
            --surface-strong: #ffffff;
            --text: #173126;
            --muted: #5e746b;
            --line: #d7e3dc;
            --accent: #2d7a55;
            --accent-dark: #215c40;
            --shadow: 0 20px 45px rgba(23, 49, 38, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(90, 160, 120, 0.18), transparent 28%),
                linear-gradient(180deg, #f8fbf9 0%, var(--bg) 100%);
        }

        .app-shell {
            min-height: 100vh;
            padding: 24px;
        }

        .app-navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            max-width: 1200px;
            margin: 0 auto 24px;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 18px;
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #79b996);
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .brand p {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-links a {
            padding: 10px 14px;
            border-radius: 999px;
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(45, 122, 85, 0.12);
            color: var(--accent-dark);
        }

        .nav-dropdown {
            position: relative;
        }

        .nav-dropdown-trigger {
            padding: 10px 14px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .nav-dropdown:hover .nav-dropdown-trigger,
        .nav-dropdown:focus-within .nav-dropdown-trigger,
        .nav-dropdown.active .nav-dropdown-trigger {
            background: rgba(45, 122, 85, 0.12);
            color: var(--accent-dark);
        }

        .nav-dropdown-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            min-width: 210px;
            display: none;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--surface-strong);
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .nav-dropdown:hover .nav-dropdown-menu,
        .nav-dropdown:focus-within .nav-dropdown-menu {
            display: grid;
            gap: 6px;
        }

        .nav-dropdown-menu a {
            display: block;
            width: 100%;
        }

        .logout-form {
            margin: 0;
        }

        .logout-button {
            padding: 10px 14px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .logout-button:hover {
            background: rgba(45, 122, 85, 0.12);
            color: var(--accent-dark);
        }

        .page-frame {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
            background: var(--surface-strong);
            border: 1px solid var(--line);
            border-radius: 28px;
            box-shadow: var(--shadow);
        }

        .page-header h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .page-header p {
            margin: 12px 0 0;
            max-width: 720px;
            color: var(--muted);
            line-height: 1.6;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 28px;
        }

        .stat-card,
        .panel {
            padding: 20px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbf9 100%);
        }

        .stat-card strong {
            display: block;
            margin-top: 10px;
            font-size: 2rem;
        }

        .panel h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .panel ul {
            margin: 0;
            padding-left: 20px;
            color: var(--muted);
            line-height: 1.6;
        }

        .panel-description {
            margin: 0 0 16px;
            color: var(--muted);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-top: 28px;
        }

        .metric-list {
            display: grid;
            gap: 14px;
        }

        .metric-row {
            display: grid;
            gap: 8px;
        }

        .metric-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.95rem;
        }

        .metric-label strong {
            font-size: 0.95rem;
        }

        .metric-bar-track {
            width: 100%;
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: #e3eee8;
        }

        .metric-bar-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), #79b996);
        }

        .page-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .button-link,
        .button-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid transparent;
            text-decoration: none;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .button-link:hover,
        .button-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(23, 49, 38, 0.08);
        }

        .button-primary {
            color: #ffffff;
            background: linear-gradient(135deg, var(--accent), #5d9e79);
        }

        .button-danger {
            color: #ffffff;
            background: linear-gradient(135deg, #b14444, #d46f5c);
        }

        .button-link {
            color: var(--accent-dark);
            background: rgba(45, 122, 85, 0.08);
            border-color: rgba(45, 122, 85, 0.16);
        }

        .button-link,
        .button-primary,
        .button-danger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid transparent;
            text-decoration: none;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .pagination {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .pagination-controls {
            display: flex;
            align-items: end;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .inline-form {
            display: flex;
            align-items: end;
            gap: 12px;
            flex-wrap: wrap;
        }

        .inline-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .inline-field label {
            font-weight: 700;
        }

        .inline-field input {
            width: 110px;
            padding: 13px 14px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #fcfefd;
            color: var(--text);
            font: inherit;
        }

        .pagination a,
        .pagination span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid rgba(45, 122, 85, 0.16);
            text-decoration: none;
            font-weight: 700;
        }

        .pagination a {
            color: var(--accent-dark);
            background: rgba(45, 122, 85, 0.08);
        }

        .pagination span {
            color: #ffffff;
            background: linear-gradient(135deg, var(--accent), #5d9e79);
            border-color: transparent;
        }

        .empty-state {
            padding: 18px;
            border: 1px dashed var(--line);
            border-radius: 16px;
            color: var(--muted);
            background: #f8fbf9;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .report-table th,
        .report-table td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
        }

        .table-actions {
            display: flex;
            justify-content: flex-end;
        }

        .report-table th {
            color: var(--accent-dark);
            font-size: 0.84rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .report-table tbody tr:hover {
            background: #f8fbf9;
        }

        .feedback-banner,
        .error-banner {
            margin-top: 24px;
            padding: 16px 18px;
            border-radius: 18px;
        }

        .feedback-banner {
            color: var(--accent-dark);
            background: rgba(45, 122, 85, 0.1);
            border: 1px solid rgba(45, 122, 85, 0.18);
        }

        .error-banner {
            color: #7d2d2d;
            background: rgba(177, 68, 68, 0.08);
            border: 1px solid rgba(177, 68, 68, 0.18);
        }

        .error-banner ul {
            margin: 8px 0 0;
            padding-left: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            margin-top: 28px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field-full {
            grid-column: 1 / -1;
        }

        .form-field label {
            font-weight: 700;
        }

        .form-field input,
        .form-field select,
        .form-field textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #fcfefd;
            color: var(--text);
            font: inherit;
        }

        .form-field textarea {
            min-height: 130px;
            resize: vertical;
        }

        .field-help {
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .selector-card {
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: #fcfefd;
        }

        .selector-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .selector-header strong {
            font-size: 1rem;
        }

        .icon-button {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(45, 122, 85, 0.16);
            border-radius: 999px;
            background: rgba(45, 122, 85, 0.08);
            color: var(--accent-dark);
            font: inherit;
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
        }

        .selection-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 24px;
        }

        .selection-chip {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(45, 122, 85, 0.1);
            color: var(--accent-dark);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .selection-empty {
            color: var(--muted);
        }

        .hidden-inputs {
            display: none;
        }

        .modal {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(10, 26, 19, 0.45);
        }

        .modal.is-open {
            display: flex;
        }

        .modal-card {
            width: min(960px, 100%);
            max-height: min(80vh, 820px);
            overflow: auto;
            padding: 24px;
            border-radius: 24px;
            background: var(--surface-strong);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.25rem;
        }

        .modal-header p {
            margin: 8px 0 0;
            color: var(--muted);
        }

        .modal-close {
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 18px;
        }

        .selectable-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .selectable-table th,
        .selectable-table td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
        }

        .selectable-table th {
            color: var(--accent-dark);
            font-size: 0.84rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            background: #f8fbf9;
        }

        .selectable-table tr:last-child td {
            border-bottom: none;
        }

        .table-check {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 18px;
        }

        @media (max-width: 700px) {
            .app-shell {
                padding: 16px;
            }

            .app-navbar,
            .page-frame {
                padding: 18px;
            }

            .app-navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-links,
            .nav-dropdown,
            .nav-dropdown-trigger,
            .logout-button {
                width: 100%;
            }

            .nav-dropdown-menu {
                position: static;
                margin-top: 8px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                padding: 16px;
            }

            .modal-card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/navbar :: navbar(${activePage})}"></div>

    <main class="page-frame">
        <div th:replace="${content}"></div>
    </main>
</div>
</body>
</html>
